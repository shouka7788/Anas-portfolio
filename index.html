<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
overflow-x:hidden;
}

/* PARTICLES BACKGROUND */
#particles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
background:radial-gradient(circle at 20% 20%, #1e293b, #0f172a);
}

/* NAV */
nav{
position:fixed;
width:100%;
top:0;
background:rgba(15,23,42,0.7);
backdrop-filter:blur(10px);
padding:15px;
text-align:center;
z-index:1000;
}
nav a{
color:white;
margin:0 15px;
text-decoration:none;
transition:0.3s;
}
nav a:hover{color:#38bdf8;}

/* HEADER */
header{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding-top:80px;
}

/* GLOW EFFECT */
.glow{
position:absolute;
width:400px;
height:400px;
background:#38bdf8;
filter:blur(150px);
opacity:0.2;
border-radius:50%;
top:20%;
left:30%;
z-index:-1;
}

/* PROFILE */
.profile-img{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #38bdf8;
margin-bottom:20px;
}

/* TEXT */
h1{
font-size:48px;
font-weight:700;
background:linear-gradient(90deg,#38bdf8,#818cf8);
-webkit-background-clip:text;
color:transparent;
}
#typing{
font-size:20px;
margin-top:10px;
color:#cbd5f5;
}

/* BUTTON */
.btn{
margin-top:25px;
padding:12px 28px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#38bdf8,#818cf8);
color:black;
cursor:pointer;
transition:0.3s;
}
.btn:hover{transform:scale(1.1);}

/* SECTIONS */
section{
padding:80px 20px;
max-width:900px;
margin:auto;
}
.card{
background:#1e293b;
padding:20px;
margin:15px 0;
border-radius:15px;
transition:0.3s;
}
.card:hover{
transform:translateY(-8px);
}

/* FADE ANIMATION */
.hidden{
opacity:0;
transform:translateY(30px);
transition:0.8s;
}
.show{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<div id="particles"></div>
<div class="glow"></div>

<nav>
<a href="#about">About</a>
<a href="#contact">Contact</a>
</nav>

<header>
<img src="profile.jpg" class="profile-img">
<h1>Anas Elhaddad</h1>
<p id="typing"></p>
<button class="btn">Contact Me</button>
</header>

<section id="about" class="hidden">
<h2>About Me</h2>
<div class="card">
Passionate English teacher creating engaging and modern learning experiences.
</div>
</section>

<section id="contact" class="hidden">
<h2>Contact</h2>
<div class="card">
<p>Email: example@email.com</p>
</div>
</section>

<script>
/* TYPING EFFECT */
const text = ["English Teacher","Creative Educator","Digital Creator"];
let i=0,j=0,current="",isDeleting=false;

function type(){
current = text[i];
document.getElementById("typing").textContent = current.substring(0,j);

if(!isDeleting && j++ === current.length){
isDeleting=true;
setTimeout(type,1000);
return;
}
if(isDeleting && j-- === 0){
isDeleting=false;
i=(i+1)%text.length;
}
setTimeout(type, isDeleting?50:100);
}
type();

/* SCROLL ANIMATION */
const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
});
document.querySelectorAll('.hidden').forEach(el=>observer.observe(el));

/* SIMPLE PARTICLES */
const canvas=document.createElement('canvas');
document.getElementById('particles').appendChild(canvas);
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*1
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=p.d;
if(p.y>canvas.height){p.y=0;}
});
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
